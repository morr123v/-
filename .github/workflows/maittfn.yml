name: Full Stack - SSH - Tailscale - Pentest Copilot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      USERNAME: runner
      PASSWORD: runner
      TAILSCALE_HOSTNAME: full-stack-${{ github.run_id }}
      PENTEST_DIR: /opt/pentest-copilot

    steps:
      - uses: actions/checkout@v4

      # ---------- SSH Server ----------
      - name: Install and configure SSH
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq openssh-server
          sudo sed -i 's/^#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/^PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo systemctl enable ssh
          sudo systemctl restart ssh

      - name: Set user password and sudo
        run: |
          echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
          echo "${USERNAME} ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/${USERNAME}

      # ---------- Tailscale ----------
      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          sudo tailscale up --authkey "${TAILSCALE_AUTHKEY}" --hostname "${TAILSCALE_HOSTNAME}"

      # ---------- Tailscale Funnel for SSH ----------
      - name: Start Tailscale Funnel for SSH
        run: |
          sudo tailscale funnel --bg --tcp=22 || true
          sudo nohup tailscale funnel --tcp=22 > /tmp/funnel.log 2>&1 &
          sleep 5

      # ---------- Pentest Copilot ----------
      - name: Install Pentest Copilot
        run: |
          git clone https://github.com/bugbasesecurity/pentest-copilot.git ${PENTEST_DIR}
          cd ${PENTEST_DIR}
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          elif [ -f pyproject.toml ]; then
            pip install .
          fi
          cat > config.yaml << 'EOF'
          # llm:
          #   provider: openai
          #   api_key: YOUR_API_KEY
          #   model: gpt-4
          EOF
          if [ -f pentest-copilot.py ]; then
            chmod +x pentest-copilot.py
            ln -s ${PENTEST_DIR}/pentest-copilot.py /usr/local/bin/pentest-copilot
          elif [ -f main.py ]; then
            chmod +x main.py
            ln -s ${PENTEST_DIR}/main.py /usr/local/bin/pentest-copilot
          fi

      # ---------- Connection Information (Funnel URL displayed clearly) ----------
      - name: Connection Information
        run: |
          TS_IP=$(sudo tailscale ip -4 | head -n1 | tr -d ' ')
          FUNNEL_HOST="${TAILSCALE_HOSTNAME}.tailscale-funnel.ts.net"
          FUNNEL_URL="tcp://${FUNNEL_HOST}:443"
          echo "============================================================"
          echo "              FULL STACK (SSH) IS READY                     "
          echo "============================================================"
          echo "SSH VIA TAILSCALE (private network):"
          echo "  ssh ${USERNAME}@${TS_IP}"
          echo "  Password: ${PASSWORD}"
          echo ""
          echo "SSH VIA TAILSCALE FUNNEL (public internet):"
          echo "  Funnel URL: ${FUNNEL_URL}"
          echo "  Connect with: ssh ${USERNAME}@${FUNNEL_HOST} -p 443"
          echo "  Password: ${PASSWORD}"
          echo ""
          echo "PENTEST COPILOT:"
          echo "  Installed at ${PENTEST_DIR}"
          echo "  After SSH login, edit ${PENTEST_DIR}/config.yaml and set your LLM API key"
          echo "  Then run: pentest-copilot --help"
          echo "============================================================"

      # ---------- Keep Alive ----------
      - name: Keep Runner Alive
        run: while true; do sleep 600; done
