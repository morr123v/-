name: Deploy Pentest Copilot with Tailscale

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      HOSTNAME: pentest-copilot-${{ github.run_id }}

    steps:
      - name: Checkout Pentest Copilot repository
        uses: actions/checkout@v4
        with:
          repository: bugbasesecurity/pentest-copilot
          path: pentest-copilot

      - name: Install Docker & dependencies
        run: |
          echo ">>> Installing Docker..."
          sudo apt-get update -qq
          sudo apt-get install -y -qq ca-certificates curl
          sudo install -m 0755 -d /etc/apt/keyrings
          sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          sudo chmod a+r /etc/apt/keyrings/docker.asc
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt-get update -qq
          sudo apt-get install -y -qq docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          sudo usermod -aG docker $USER

      - name: Prepare environment files
        working-directory: pentest-copilot
        run: |
          echo "TS_AUTHKEY=${TAILSCALE_AUTHKEY}" > .env
          cat > serve.json << 'EOF'
          {
            "TCP": {
              "443": {
                "HTTPS": true
              }
            },
            "Web": {
              "${TS_CERT_DOMAIN}:443": {
                "Handlers": {
                  "/": {
                    "Proxy": "http://127.0.0.1:3000"
                  }
                }
              }
            }
          }
          EOF

      - name: Generate docker-compose.yml with Tailscale integration
        working-directory: pentest-copilot
        run: |
          cat > docker-compose.yml << 'EOF'
          services:
            db:
              image: postgres:15
              environment:
                POSTGRES_USER: pentest
                POSTGRES_PASSWORD: pentest123
                POSTGRES_DB: pentest_copilot
              volumes:
                - db_data:/var/lib/postgresql/data
              restart: unless-stopped

            app:
              build: .
              depends_on:
                - db
              environment:
                DATABASE_URL: postgresql://pentest:pentest123@db:5432/pentest_copilot
                SECRET_KEY_BASE: super-secret-key-change-me-please
              volumes:
                - ./data:/app/data
              restart: unless-stopped

            tailscale:
              image: tailscale/tailscale:latest
              hostname: ${HOSTNAME}
              environment:
                - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
                - TS_STATE_DIR=/var/lib/tailscale
                - TS_SERVE_CONFIG=/config/serve.json
                - TS_HOSTNAME=${HOSTNAME}
              volumes:
                - tailscale_data:/var/lib/tailscale
                - ./serve.json:/config/serve.json
              cap_add:
                - NET_ADMIN
                - NET_RAW
              network_mode: "service:app"
              restart: unless-stopped

          volumes:
            db_data:
            tailscale_data:
          EOF

      - name: Start Pentest Copilot services
        working-directory: pentest-copilot
        run: |
          docker compose up -d
          # Wait for Tailscale to come online
          sleep 15

      - name: Show access information
        run: |
          # Tailscale MagicDNS ලිපිනය ලබා ගැනීම (උදා: hostname.tailnet-name.ts.net)
          # Docker container එකෙන් tailscale status එක ගැනීම
          TAILSCALE_IP=$(docker compose -f pentest-copilot/docker-compose.yml exec -T tailscale tailscale ip -4 2>/dev/null || true)
          echo "=== PENTEST COPILOT IS RUNNING ==="
          echo "Tailscale IP: ${TAILSCALE_IP:-pending...}"
          echo "Access via MagicDNS: https://${HOSTNAME}.your-tailnet.ts.net"
          echo "(Replace 'your-tailnet' with your actual Tailscale network name)"
          echo ""
          echo ">>> Keeping runner alive for 6 hours (max allowed for ephemeral runners)"
          echo ">>> Press Ctrl+C in the Actions log to stop."

      - name: Keep runner alive
        run: |
          # GitHub Actions workflow timeout එකට අනුව (උපරිම පැය 6)
          # මෙය runner එක පණපිට තබා ගනී.
          tail -f /dev/null
